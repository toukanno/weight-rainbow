<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>レインボー体重管理</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans JP',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
header{padding:2rem;text-align:center;border-bottom:1px solid rgba(255,255,255,.1);background:linear-gradient(135deg,#0a0a20,#0f172a)}
h1{font-size:1.8rem;margin-bottom:.4rem}.sub{color:#94a3b8;font-size:.9rem}
main{max-width:700px;margin:2rem auto;padding:0 1.5rem}
.panel{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:1.5rem;margin-bottom:1.5rem}
h2{color:#818cf8;margin-bottom:1rem;font-size:1.05rem}
.btn{padding:.7rem 1.5rem;background:#818cf8;border:none;border-radius:6px;color:#000;cursor:pointer;font-size:.9rem;font-family:inherit;font-weight:700;margin:.3rem;transition:opacity .2s}.btn:hover{opacity:.8}
input,select{width:100%;padding:.7rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#e2e8f0;font-family:inherit;font-size:.9rem;margin:.3rem 0}
input:focus,select:focus{outline:none;border-color:#818cf8}
label{font-size:.85rem;color:#94a3b8}
.big{font-size:2.5rem;font-weight:900;color:#818cf8;text-align:center}
</style></head><body>
<header><h1>🌈 レインボー体重管理</h1><p class="sub">体重をカラフルに可視化する管理アプリ</p></header>
<main><div class="panel">
<h2>体重を記録</h2>
<label>体重 (kg)</label><input type="number" id="wt" placeholder="65.0" step="0.1">
<label>日付</label><input type="date" id="dt">
<button class="btn" onclick="save()" style="width:100%;margin-top:.5rem">記録する</button>
</div>
<div class="panel">
<h2>体重の推移</h2>
<canvas id="chart" width="600" height="250" style="width:100%;border-radius:6px;background:rgba(0,0,0,.2)"></canvas>
<div id="stats" style="display:flex;justify-content:space-around;margin-top:1rem;flex-wrap:wrap;gap:.5rem"></div>
</div></main><script type="module">
import{validateWeight,upsertRecord,trimRecords,calcStats}from"./src/logic.js";
function save(){
  const result=validateWeight(document.getElementById("wt").value);
  const dt=document.getElementById("dt").value||new Date().toISOString().slice(0,10);
  if(!result.valid){alert(result.error);return;}
  let d=JSON.parse(localStorage.getItem("weightLog")||"[]");
  d=upsertRecord(d,dt,result.weight);
  d=trimRecords(d,90);
  localStorage.setItem("weightLog",JSON.stringify(d));
  document.getElementById("wt").value="";
  render();
}
function render(){
  const d=JSON.parse(localStorage.getItem("weightLog")||"[]");
  if(!d.length){return;}
  const c=document.getElementById("chart");const ctx=c.getContext("2d");
  const W=c.width,H=c.height,PAD=40;
  ctx.clearRect(0,0,W,H);
  const weights=d.map(r=>r.wt);
  const stats=calcStats(weights);
  const min=stats.min-1,max=stats.max+1;
  function py(w){return H-PAD-(w-min)/(max-min)*(H-PAD*2);}
  function px(i){return PAD+(i/(d.length-1||1))*(W-PAD*2);}
  ctx.strokeStyle="rgba(255,255,255,.05)";ctx.lineWidth=1;
  for(let i=0;i<5;i++){const y=PAD+(i/4)*(H-PAD*2);ctx.beginPath();ctx.moveTo(PAD,y);ctx.lineTo(W-PAD,y);ctx.stroke();}
  ctx.strokeStyle="#6366f1";ctx.lineWidth=2;ctx.beginPath();
  d.forEach((r,i)=>{i===0?ctx.moveTo(px(i),py(r.wt)):ctx.lineTo(px(i),py(r.wt));});ctx.stroke();
  ctx.fillStyle="#6366f1";d.forEach((r,i)=>{ctx.beginPath();ctx.arc(px(i),py(r.wt),4,0,Math.PI*2);ctx.fill();});
  ctx.fillStyle="#94a3b8";ctx.font="11px sans-serif";ctx.textAlign="center";
  [0,Math.floor(d.length/2),d.length-1].filter((v,i,a)=>a.indexOf(v)===i).forEach(i=>{
    if(i<d.length)ctx.fillText(d[i].dt.slice(5),px(i),H-5);
  });
  document.getElementById("stats").innerHTML=[
    {label:"最新",val:stats.latest+"kg"},
    {label:"最小",val:stats.min+"kg"},
    {label:"最大",val:stats.max+"kg"},
    {label:"変化",val:(stats.change>=0?"+":"")+stats.change.toFixed(1)+"kg"},
    {label:"平均",val:stats.avg+"kg"},
  ].map(s=>'<div style="text-align:center;padding:.5rem 1rem;background:rgba(255,255,255,.03);border-radius:6px;font-size:.85rem"><div style="color:#94a3b8">'+s.label+'</div><div style="font-weight:700;color:#6366f1">'+s.val+'</div></div>').join("");
}
window.save=save;
render();</script></body></html>
