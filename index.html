<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="写真・音声・手入力に対応した、ローカル保存中心の体重管理アプリです。" />
    <meta name="theme-color" content="#ff5f6d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <title>レインボー体重管理</title>
    <style>
      :root {
        --bg: #fbf8ff;
        --surface: rgba(255, 255, 255, 0.74);
        --surface-strong: rgba(255, 255, 255, 0.92);
        --text: #1f2440;
        --muted: #5b6187;
        --border: rgba(99, 102, 241, 0.12);
        --accent: #ff5f6d;
        --accent-2: #7c3aed;
        --accent-3: #0ea5e9;
        --ok: #10b981;
        --shadow: 0 24px 80px rgba(88, 64, 168, 0.15);
        --hero: linear-gradient(135deg, rgba(255, 95, 109, 0.18), rgba(255, 196, 113, 0.18), rgba(14, 165, 233, 0.18));
        --body: radial-gradient(circle at top left, rgba(255, 95, 109, 0.2), transparent 30%), radial-gradient(circle at top right, rgba(124, 58, 237, 0.16), transparent 32%), linear-gradient(180deg, #fffefc, #f5f7ff 44%, #eef3ff);
      }

      body[data-theme="sunrise"] {
        --bg: #fff8f3;
        --surface: rgba(255, 255, 255, 0.72);
        --surface-strong: rgba(255, 255, 255, 0.94);
        --text: #3a2435;
        --muted: #7d6271;
        --border: rgba(255, 120, 80, 0.16);
        --accent: #ff7a59;
        --accent-2: #ffb347;
        --accent-3: #ec4899;
        --shadow: 0 24px 80px rgba(213, 106, 80, 0.16);
        --hero: linear-gradient(135deg, rgba(255, 122, 89, 0.18), rgba(255, 179, 71, 0.2), rgba(236, 72, 153, 0.16));
        --body: radial-gradient(circle at top left, rgba(255, 122, 89, 0.18), transparent 32%), radial-gradient(circle at top right, rgba(255, 179, 71, 0.18), transparent 30%), linear-gradient(180deg, #fffbf8, #fff1ec 48%, #fff8f3);
      }

      body[data-theme="mist"] {
        --bg: #f4fbff;
        --surface: rgba(255, 255, 255, 0.7);
        --surface-strong: rgba(255, 255, 255, 0.92);
        --text: #17344a;
        --muted: #537184;
        --border: rgba(14, 165, 233, 0.14);
        --accent: #0ea5e9;
        --accent-2: #22c55e;
        --accent-3: #8b5cf6;
        --shadow: 0 24px 80px rgba(66, 153, 188, 0.16);
        --hero: linear-gradient(135deg, rgba(14, 165, 233, 0.18), rgba(34, 197, 94, 0.16), rgba(139, 92, 246, 0.16));
        --body: radial-gradient(circle at top left, rgba(14, 165, 233, 0.15), transparent 34%), radial-gradient(circle at top right, rgba(34, 197, 94, 0.12), transparent 32%), linear-gradient(180deg, #f7feff, #f0fbff 48%, #eef8ff);
      }

      body[data-theme="forest"] {
        --bg: #f3faf5;
        --surface: rgba(255, 255, 255, 0.7);
        --surface-strong: rgba(255, 255, 255, 0.92);
        --text: #1a3a2a;
        --muted: #4d7a5e;
        --border: rgba(16, 185, 129, 0.14);
        --accent: #10b981;
        --accent-2: #059669;
        --accent-3: #84cc16;
        --shadow: 0 24px 80px rgba(16, 185, 129, 0.15);
        --hero: linear-gradient(135deg, rgba(16, 185, 129, 0.18), rgba(5, 150, 105, 0.16), rgba(132, 204, 22, 0.16));
        --body: radial-gradient(circle at top left, rgba(16, 185, 129, 0.15), transparent 34%), radial-gradient(circle at top right, rgba(132, 204, 22, 0.12), transparent 32%), linear-gradient(180deg, #f5fff8, #eefaf2 48%, #e8f5ec);
      }

      body[data-theme="lavender"] {
        --bg: #f8f5ff;
        --surface: rgba(255, 255, 255, 0.72);
        --surface-strong: rgba(255, 255, 255, 0.93);
        --text: #2d2454;
        --muted: #6e63a0;
        --border: rgba(139, 92, 246, 0.14);
        --accent: #8b5cf6;
        --accent-2: #a78bfa;
        --accent-3: #c084fc;
        --shadow: 0 24px 80px rgba(139, 92, 246, 0.16);
        --hero: linear-gradient(135deg, rgba(139, 92, 246, 0.18), rgba(167, 139, 250, 0.16), rgba(192, 132, 252, 0.16));
        --body: radial-gradient(circle at top left, rgba(139, 92, 246, 0.15), transparent 34%), radial-gradient(circle at top right, rgba(192, 132, 252, 0.12), transparent 32%), linear-gradient(180deg, #fcf9ff, #f5f0ff 48%, #efe8ff);
      }

      body[data-theme="ocean"] {
        --bg: #f0f7ff;
        --surface: rgba(255, 255, 255, 0.7);
        --surface-strong: rgba(255, 255, 255, 0.92);
        --text: #0f2b4a;
        --muted: #3b6b96;
        --border: rgba(59, 130, 246, 0.14);
        --accent: #3b82f6;
        --accent-2: #2563eb;
        --accent-3: #06b6d4;
        --shadow: 0 24px 80px rgba(59, 130, 246, 0.16);
        --hero: linear-gradient(135deg, rgba(59, 130, 246, 0.18), rgba(37, 99, 235, 0.16), rgba(6, 182, 212, 0.16));
        --body: radial-gradient(circle at top left, rgba(59, 130, 246, 0.15), transparent 34%), radial-gradient(circle at top right, rgba(6, 182, 212, 0.12), transparent 32%), linear-gradient(180deg, #f5faff, #eaf3ff 48%, #e0edff);
      }

      body[data-theme="cherry"] {
        --bg: #fff5f7;
        --surface: rgba(255, 255, 255, 0.72);
        --surface-strong: rgba(255, 255, 255, 0.93);
        --text: #3d1f2e;
        --muted: #8a5068;
        --border: rgba(236, 72, 153, 0.14);
        --accent: #ec4899;
        --accent-2: #f472b6;
        --accent-3: #fb7185;
        --shadow: 0 24px 80px rgba(236, 72, 153, 0.16);
        --hero: linear-gradient(135deg, rgba(236, 72, 153, 0.18), rgba(244, 114, 182, 0.16), rgba(251, 113, 133, 0.16));
        --body: radial-gradient(circle at top left, rgba(236, 72, 153, 0.15), transparent 34%), radial-gradient(circle at top right, rgba(251, 113, 133, 0.12), transparent 32%), linear-gradient(180deg, #fff8fa, #fff0f4 48%, #ffe8ef);
      }

      body[data-theme="midnight"] {
        --bg: #141826;
        --surface: rgba(30, 35, 55, 0.82);
        --surface-strong: rgba(30, 35, 55, 0.94);
        --text: #e4e7f0;
        --muted: #8b92b0;
        --border: rgba(139, 146, 176, 0.18);
        --accent: #818cf8;
        --accent-2: #6366f1;
        --accent-3: #a78bfa;
        --ok: #34d399;
        --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        --hero: linear-gradient(135deg, rgba(129, 140, 248, 0.14), rgba(99, 102, 241, 0.12), rgba(167, 139, 250, 0.12));
        --body: radial-gradient(circle at top left, rgba(129, 140, 248, 0.1), transparent 34%), radial-gradient(circle at top right, rgba(167, 139, 250, 0.08), transparent 32%), linear-gradient(180deg, #181c2e, #141826 48%, #10131f);
      }

      body[data-theme="amber"] {
        --bg: #fffbf0;
        --surface: rgba(255, 255, 255, 0.72);
        --surface-strong: rgba(255, 255, 255, 0.93);
        --text: #3d2e0f;
        --muted: #8a7340;
        --border: rgba(245, 158, 11, 0.16);
        --accent: #f59e0b;
        --accent-2: #d97706;
        --accent-3: #eab308;
        --shadow: 0 24px 80px rgba(245, 158, 11, 0.16);
        --hero: linear-gradient(135deg, rgba(245, 158, 11, 0.18), rgba(217, 119, 6, 0.16), rgba(234, 179, 8, 0.16));
        --body: radial-gradient(circle at top left, rgba(245, 158, 11, 0.15), transparent 34%), radial-gradient(circle at top right, rgba(234, 179, 8, 0.12), transparent 32%), linear-gradient(180deg, #fffdf5, #fff8e8 48%, #fff3d6);
      }

      body[data-theme="rose"] {
        --bg: #fff5f5;
        --surface: rgba(255, 255, 255, 0.72);
        --surface-strong: rgba(255, 255, 255, 0.93);
        --text: #3d1f1f;
        --muted: #8a5050;
        --border: rgba(244, 63, 94, 0.14);
        --accent: #f43f5e;
        --accent-2: #e11d48;
        --accent-3: #fb923c;
        --shadow: 0 24px 80px rgba(244, 63, 94, 0.16);
        --hero: linear-gradient(135deg, rgba(244, 63, 94, 0.18), rgba(225, 29, 72, 0.16), rgba(251, 146, 60, 0.16));
        --body: radial-gradient(circle at top left, rgba(244, 63, 94, 0.15), transparent 34%), radial-gradient(circle at top right, rgba(251, 146, 60, 0.12), transparent 32%), linear-gradient(180deg, #fff8f8, #fff0f0 48%, #ffe8e8);
      }

      body[data-theme="mint"] {
        --bg: #f0fffe;
        --surface: rgba(255, 255, 255, 0.7);
        --surface-strong: rgba(255, 255, 255, 0.92);
        --text: #0f3d3a;
        --muted: #3b8a84;
        --border: rgba(20, 184, 166, 0.14);
        --accent: #14b8a6;
        --accent-2: #0d9488;
        --accent-3: #2dd4bf;
        --shadow: 0 24px 80px rgba(20, 184, 166, 0.16);
        --hero: linear-gradient(135deg, rgba(20, 184, 166, 0.18), rgba(13, 148, 136, 0.16), rgba(45, 212, 191, 0.16));
        --body: radial-gradient(circle at top left, rgba(20, 184, 166, 0.15), transparent 34%), radial-gradient(circle at top right, rgba(45, 212, 191, 0.12), transparent 32%), linear-gradient(180deg, #f5fffe, #eafaf8 48%, #e0f5f2);
      }

      * {
        box-sizing: border-box;
        -webkit-text-size-adjust: 100%;
      }

      html {
        touch-action: manipulation;
        -webkit-touch-callout: none;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Hiragino Sans", "Yu Gothic", sans-serif;
        color: var(--text);
        background: var(--body);
        padding:
          env(safe-area-inset-top, 0)
          env(safe-area-inset-right, 0)
          env(safe-area-inset-bottom, 0)
          env(safe-area-inset-left, 0);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app-shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }

      .hero {
        position: relative;
        overflow: hidden;
        background: var(--hero), var(--surface-strong);
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto -10% -40% auto;
        width: 280px;
        height: 280px;
        background: conic-gradient(from 200deg, rgba(255, 95, 109, 0.5), rgba(255, 196, 113, 0.35), rgba(14, 165, 233, 0.4), rgba(124, 58, 237, 0.36), rgba(255, 95, 109, 0.5));
        filter: blur(40px);
        opacity: 0.48;
        pointer-events: none;
      }

      .hero-top,
      .hero-bottom,
      .content-grid,
      .section-header,
      .row,
      .input-grid,
      .tab-row,
      .stat-grid,
      .record-row,
      .settings-grid,
      .note-grid,
      .ad-slot {
        display: grid;
      }

      .hero-top {
        grid-template-columns: 1.5fr 1fr;
        gap: 20px;
        align-items: start;
        position: relative;
        z-index: 1;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 12px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        background: rgba(255, 255, 255, 0.66);
        border: 1px solid rgba(255, 255, 255, 0.62);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        margin-top: 14px;
        font-size: clamp(2rem, 4vw, 3.4rem);
        line-height: 0.98;
        letter-spacing: -0.04em;
      }

      .hero-copy {
        margin-top: 14px;
        color: var(--muted);
        line-height: 1.7;
        max-width: 60ch;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 20px;
      }

      .pill {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.68);
        border: 1px solid rgba(255, 255, 255, 0.7);
        font-size: 13px;
      }

      .hero-card,
      .panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 24px;
        backdrop-filter: blur(18px);
        box-shadow: var(--shadow);
      }

      .hero-card {
        padding: 20px;
      }

      .hero-card .bmi-score {
        margin-top: 16px;
        font-size: clamp(2.2rem, 6vw, 3.6rem);
        font-weight: 800;
        letter-spacing: -0.05em;
      }

      .hero-card .bmi-label {
        color: var(--muted);
        margin-top: 10px;
        line-height: 1.6;
      }

      .hero-bottom {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-top: 20px;
        position: relative;
        z-index: 1;
      }

      .metric {
        padding: 16px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.7);
        transition: transform 0.15s ease;
      }

      @media (hover: hover) {
        .metric:hover {
          transform: scale(1.03);
        }
      }

      .metric .label {
        font-size: 12px;
        color: var(--muted);
      }

      .metric .value {
        margin-top: 8px;
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.03em;
      }

      .content-grid {
        grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
        gap: 18px;
        margin-top: 18px;
      }

      .column {
        display: grid;
        gap: 18px;
      }

      .panel {
        padding: 22px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      @media (hover: hover) {
        .panel:hover {
          transform: translateY(-2px);
          box-shadow: var(--shadow), 0 4px 20px rgba(0,0,0,0.06);
        }
      }

      .section-header {
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: end;
        margin-bottom: 18px;
      }

      .section-header p {
        color: var(--muted);
        font-size: 14px;
      }

      .input-grid,
      .settings-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field.span-2 {
        grid-column: span 2;
      }

      label {
        font-size: 13px;
        color: var(--muted);
      }

      input,
      select {
        width: 100%;
        border: 1px solid rgba(120, 130, 180, 0.18);
        background: rgba(255, 255, 255, 0.84);
        color: var(--text);
        border-radius: 16px;
        padding: 13px 14px;
        transition: border-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: color-mix(in srgb, var(--accent) 64%, white);
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent) 14%, transparent);
        transform: translateY(-1px);
      }

      .helper {
        font-size: 12px;
        color: var(--muted);
        line-height: 1.6;
      }

      .tab-row {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 16px;
      }

      .tab,
      .btn,
      .tag,
      .chip {
        border: 0;
        border-radius: 16px;
      }

      .tab,
      .btn {
        padding: 13px 14px;
      }

      .tab {
        background: rgba(255, 255, 255, 0.54);
        color: var(--muted);
        border: 1px solid rgba(120, 130, 180, 0.12);
      }

      .tab.active {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white;
        box-shadow: 0 14px 30px color-mix(in srgb, var(--accent) 22%, transparent);
      }

      .btn {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white;
        font-weight: 700;
        box-shadow: 0 14px 30px color-mix(in srgb, var(--accent) 22%, transparent);
        transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      }

      .btn:active {
        transform: scale(0.97);
      }

      @media (hover: hover) {
        .btn:hover {
          transform: translateY(-1px);
          box-shadow: 0 18px 36px color-mix(in srgb, var(--accent) 28%, transparent);
        }
      }

      .btn.secondary {
        background: rgba(255, 255, 255, 0.82);
        color: var(--text);
        border: 1px solid rgba(120, 130, 180, 0.16);
        box-shadow: none;
      }

      .btn.ghost {
        background: transparent;
        color: var(--muted);
        border: 1px dashed rgba(120, 130, 180, 0.24);
        box-shadow: none;
      }

      .row {
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
      }

      .entry-layout {
        display: grid;
        gap: 16px;
      }

      .voice-box,
      .photo-box,
      .privacy-box,
      .review-card,
      .record-item,
      .ad-slot {
        border: 1px solid rgba(120, 130, 180, 0.14);
        background: rgba(255, 255, 255, 0.58);
        border-radius: 20px;
      }

      .voice-box,
      .photo-box,
      .privacy-box,
      .review-card,
      .ad-slot {
        padding: 16px;
      }

      .voice-transcript {
        min-height: 46px;
        margin-top: 12px;
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.8);
        color: var(--muted);
      }

      .photo-preview {
        margin-top: 14px;
        width: 100%;
        max-height: 260px;
        object-fit: cover;
        border-radius: 18px;
        border: 1px solid rgba(120, 130, 180, 0.14);
        background: rgba(255, 255, 255, 0.9);
      }

      .chip-row,
      .record-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .chip {
        padding: 8px 10px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(120, 130, 180, 0.16);
      }

      .hidden {
        display: none !important;
      }

      canvas {
        width: 100%;
        height: 280px;
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.55));
        border: 1px solid rgba(120, 130, 180, 0.12);
      }

      .stat-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-top: 14px;
      }

      .stat-card {
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(120, 130, 180, 0.14);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      @media (hover: hover) {
        .stat-card:hover {
          transform: translateY(-2px);
          box-shadow: 0 6px 16px rgba(0,0,0,0.06);
        }
      }

      .stat-card .label {
        font-size: 12px;
        color: var(--muted);
      }

      .stat-card .value {
        margin-top: 8px;
        font-size: 1.2rem;
        font-weight: 800;
      }

      .record-list {
        margin-top: 16px;
        flex-direction: column;
      }

      .record-item {
        padding: 14px 16px;
      }

      .record-row {
        grid-template-columns: auto 1fr auto;
        gap: 12px;
        align-items: center;
      }

      .record-weight {
        font-size: 1.2rem;
        font-weight: 800;
      }

      .tag {
        padding: 8px 10px;
        font-size: 12px;
        background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 12%, white), color-mix(in srgb, var(--accent-3) 10%, white));
        color: var(--text);
      }

      .note-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .review-card h3,
      .privacy-box h3,
      .photo-box h3,
      .voice-box h3 {
        margin-bottom: 8px;
      }

      .review-card p,
      .privacy-box p,
      .photo-box p,
      .voice-box p {
        color: var(--muted);
        line-height: 1.7;
        font-size: 14px;
      }

      .checklist {
        margin: 10px 0 0;
        padding-left: 20px;
        color: var(--muted);
        line-height: 1.7;
      }

      .ad-slot {
        grid-template-columns: auto 1fr;
        gap: 14px;
        align-items: center;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.58));
      }

      .ad-badge {
        width: 48px;
        height: 48px;
        display: grid;
        place-items: center;
        border-radius: 16px;
        background: linear-gradient(135deg, var(--accent), var(--accent-3));
        color: white;
        font-weight: 800;
      }

      .status {
        min-height: 24px;
        margin-top: 14px;
        font-size: 13px;
        color: var(--ok);
      }

      .warn {
        color: #dc2626;
      }

      /* Weight Picker */
      .weight-picker {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .weight-picker select {
        flex: 1;
        text-align: center;
        font-size: 1.2rem;
        font-weight: 700;
        padding: 13px 8px;
      }

      .weight-picker .picker-dot {
        font-size: 1.4rem;
        font-weight: 800;
        color: var(--muted);
      }

      .weight-picker .picker-unit {
        font-size: 1rem;
        color: var(--muted);
        font-weight: 600;
      }

      /* Quick Record */
      .quick-section {
        margin-top: 16px;
        padding: 18px;
        border-radius: 20px;
        background: linear-gradient(135deg, rgba(255,255,255,0.72), rgba(255,255,255,0.54));
        border: 1px solid rgba(120, 130, 180, 0.14);
      }

      .quick-display {
        text-align: center;
        font-size: 2.4rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        margin: 12px 0;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .quick-buttons {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .quick-buttons button {
        padding: 10px 18px;
        border-radius: 999px;
        border: 1px solid rgba(120, 130, 180, 0.16);
        background: rgba(255,255,255,0.82);
        font-weight: 700;
        font-size: 1rem;
        transition: transform 0.12s, box-shadow 0.12s;
      }

      .quick-buttons button:active {
        transform: scale(0.94);
      }

      .quick-buttons .quick-save {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white;
        border: none;
        padding: 12px 28px;
        box-shadow: 0 8px 24px color-mix(in srgb, var(--accent) 22%, transparent);
      }

      /* Records List */
      .records-panel .record-item {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 8px;
      }

      .record-delete {
        padding: 6px 12px;
        border-radius: 12px;
        border: 1px solid rgba(220, 38, 38, 0.2);
        background: rgba(220, 38, 38, 0.08);
        color: #dc2626;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.15s;
      }

      .record-delete:hover {
        background: rgba(220, 38, 38, 0.16);
      }

      /* Export Buttons */
      .export-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 16px;
      }

      /* Rainbow Animation */
      @keyframes rainbow-bg {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      @keyframes rainbow-fade-in {
        0%   { opacity: 0; transform: scale(0.8) translateY(20px); }
        20%  { opacity: 1; transform: scale(1.05) translateY(-5px); }
        40%  { transform: scale(1) translateY(0); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }

      @keyframes rainbow-fade-out {
        0%   { opacity: 1; }
        100% { opacity: 0; pointer-events: none; }
      }

      @keyframes confetti-fall {
        0%   { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
        100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
      }

      @keyframes rainbow-shimmer {
        0%   { background-position: 0% 50%; }
        100% { background-position: 200% 50%; }
      }

      /* Streak Badge */
      .streak-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 700;
        background: linear-gradient(135deg, #ff9a00, #ff5f6d);
        color: white;
        box-shadow: 0 4px 16px rgba(255, 95, 109, 0.25);
      }

      .streak-badge.rainbow {
        background: linear-gradient(90deg, #ff0000, #ff9a00, #d0de21, #4fdc4a, #3fdad8, #2f6bec, #8b45db, #ff0000);
        background-size: 200% 100%;
        animation: rainbow-shimmer 2s linear infinite;
      }

      /* Google Drive button */
      .google-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 18px;
        border-radius: 16px;
        border: 1px solid rgba(120, 130, 180, 0.16);
        background: rgba(255, 255, 255, 0.82);
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s;
      }

      .google-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      }

      .google-btn svg {
        width: 18px;
        height: 18px;
      }

      /* Trend indicator */
      .trend-indicator {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 13px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 999px;
      }

      .trend-indicator.down {
        background: rgba(16, 185, 129, 0.12);
        color: #10b981;
      }

      .trend-indicator.up {
        background: rgba(220, 38, 38, 0.12);
        color: #dc2626;
      }

      .trend-indicator.flat {
        background: rgba(120, 130, 180, 0.12);
        color: var(--muted);
      }

      .rainbow-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(270deg,
          rgba(255,0,0,0.15), rgba(255,154,0,0.15), rgba(208,222,33,0.15),
          rgba(79,220,74,0.15), rgba(63,218,216,0.15), rgba(47,107,236,0.15),
          rgba(139,69,219,0.15), rgba(255,0,0,0.15));
        background-size: 400% 400%;
        animation: rainbow-bg 2s ease infinite, rainbow-fade-in 0.6s ease-out;
        backdrop-filter: blur(8px);
      }

      .rainbow-overlay.fade-out {
        animation: rainbow-fade-out 0.5s ease-out forwards;
      }

      .rainbow-card {
        background: rgba(255,255,255,0.92);
        border-radius: 28px;
        padding: 36px 48px;
        text-align: center;
        box-shadow: 0 24px 80px rgba(0,0,0,0.15);
        max-width: 360px;
      }

      .rainbow-emoji {
        font-size: 4rem;
        line-height: 1;
        margin-bottom: 12px;
      }

      .rainbow-text {
        font-size: 1.2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #ff0000, #ff9a00, #d0de21, #4fdc4a, #3fdad8, #2f6bec, #8b45db);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .rainbow-detail {
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .confetti-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        overflow: hidden;
      }

      .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 2px;
        animation: confetti-fall var(--confetti-duration, 2s) ease-out forwards;
        animation-delay: var(--confetti-delay, 0s);
      }

      /* Midnight theme overrides for inputs */
      body[data-theme="midnight"] input,
      body[data-theme="midnight"] select {
        background: rgba(30, 35, 55, 0.7);
        border-color: rgba(139, 146, 176, 0.24);
        color: #e4e7f0;
      }

      body[data-theme="midnight"] .eyebrow,
      body[data-theme="midnight"] .pill,
      body[data-theme="midnight"] .chip,
      body[data-theme="midnight"] .metric,
      body[data-theme="midnight"] .stat-card,
      body[data-theme="midnight"] .voice-box,
      body[data-theme="midnight"] .photo-box,
      body[data-theme="midnight"] .privacy-box,
      body[data-theme="midnight"] .review-card,
      body[data-theme="midnight"] .record-item,
      body[data-theme="midnight"] .voice-transcript {
        background: rgba(30, 35, 55, 0.6);
        border-color: rgba(139, 146, 176, 0.18);
      }

      body[data-theme="midnight"] .tab {
        background: rgba(30, 35, 55, 0.5);
        border-color: rgba(139, 146, 176, 0.16);
      }

      body[data-theme="midnight"] .btn.secondary {
        background: rgba(30, 35, 55, 0.7);
        color: #e4e7f0;
        border-color: rgba(139, 146, 176, 0.2);
      }

      /* Language selection modal */
      .lang-modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(12px);
      }

      .lang-modal {
        background: white;
        border-radius: 28px;
        padding: 40px;
        max-width: 400px;
        width: calc(100% - 32px);
        text-align: center;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.2);
        animation: rainbow-fade-in 0.4s ease-out;
      }

      .lang-modal h2 {
        font-size: 1.6rem;
        margin-bottom: 8px;
      }

      .lang-modal p {
        color: #5b6187;
        margin-bottom: 24px;
        line-height: 1.6;
      }

      .lang-modal-buttons {
        display: grid;
        gap: 12px;
      }

      .lang-modal-buttons button {
        padding: 16px;
        border-radius: 16px;
        border: 1px solid rgba(120, 130, 180, 0.16);
        background: rgba(255, 255, 255, 0.82);
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      }

      .lang-modal-buttons button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        background: linear-gradient(135deg, #ff5f6d, #7c3aed);
        color: white;
      }

      /* Theme color swatches in settings */
      .theme-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
      }

      .theme-swatch {
        position: relative;
        aspect-ratio: 1;
        border-radius: 16px;
        border: 2px solid rgba(120, 130, 180, 0.16);
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 4px;
        background: none;
      }

      .theme-swatch:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      }

      .theme-swatch.active {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
      }

      .theme-swatch .swatch-color {
        width: 28px;
        height: 28px;
        border-radius: 50%;
      }

      .theme-swatch .swatch-label {
        font-size: 10px;
        color: var(--muted);
        line-height: 1.2;
      }

      /* Daily Diff */
      .diff-box {
        padding: 16px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid rgba(120, 130, 180, 0.14);
      }

      .diff-value {
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: -0.03em;
        margin: 8px 0;
      }

      .diff-value.positive { color: #dc2626; }
      .diff-value.negative { color: #10b981; }
      .diff-value.zero { color: var(--muted); }

      .diff-detail {
        font-size: 13px;
        color: var(--muted);
      }

      /* Goal Progress */
      .goal-box {
        padding: 16px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.65);
        border: 1px solid rgba(120, 130, 180, 0.14);
      }

      .progress-bar-track {
        width: 100%;
        height: 12px;
        border-radius: 6px;
        background: rgba(120, 130, 180, 0.12);
        margin: 10px 0;
        overflow: hidden;
      }

      .progress-bar-fill {
        height: 100%;
        border-radius: 6px;
        background: linear-gradient(90deg, var(--accent), var(--ok));
        transition: width 0.5s ease;
      }

      .progress-text {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        color: var(--muted);
      }

      .progress-percent {
        font-size: 1.4rem;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent), var(--ok));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .prediction-text {
        margin-top: 8px;
        font-size: 13px;
        font-weight: 600;
        color: var(--accent-2);
        padding: 6px 10px;
        border-radius: 10px;
        background: color-mix(in srgb, var(--accent-2) 8%, transparent);
      }

      /* Summary */
      .summary-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }

      .summary-tab {
        padding: 8px 18px;
        border-radius: 999px;
        border: 1px solid rgba(120, 130, 180, 0.16);
        background: rgba(255, 255, 255, 0.54);
        color: var(--muted);
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
      }

      .summary-tab.active {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: white;
        border-color: transparent;
      }

      /* Reminder */
      .reminder-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 14px;
      }

      /* Streak Badge */
      .streak-badge {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.68);
        border: 1px solid rgba(255, 255, 255, 0.7);
        font-size: 13px;
        font-weight: 700;
      }

      .streak-badge.rainbow {
        background: linear-gradient(135deg, #ff0000, #ff9a00, #d0de21, #4fdc4a, #3fdad8, #2f6bec, #8b45db);
        color: white;
        border: none;
        animation: rainbow-bg 3s ease infinite;
        background-size: 400% 400%;
      }

      /* Trend Indicator */
      .trend-indicator {
        padding: 10px 14px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.68);
        border: 1px solid rgba(255, 255, 255, 0.7);
      }

      .trend-indicator.down { color: #10b981; }
      .trend-indicator.up { color: #dc2626; }
      .trend-indicator.flat { color: var(--muted); }

      /* Goal Prediction */
      .prediction-text {
        margin-top: 8px;
        font-size: 13px;
        color: var(--muted);
      }

      /* Google Drive Button */
      .google-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 18px;
        border-radius: 16px;
        border: 1px solid rgba(120, 130, 180, 0.16);
        background: rgba(255, 255, 255, 0.82);
        color: var(--text);
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s;
      }

      .google-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      }

      .google-btn svg {
        width: 20px;
        height: 20px;
      }

      /* Enhanced Rainbow Animation */
      @keyframes rainbow-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }

      .rainbow-overlay .rainbow-card {
        animation: rainbow-fade-in 0.6s ease-out, rainbow-pulse 1.5s ease-in-out infinite 0.6s;
      }

      @keyframes confetti-fall {
        0%   { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
        50%  { opacity: 0.8; }
        100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
      }

      .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 2px;
        animation: confetti-fall 2.5s ease-out forwards;
      }

      /* Midnight theme overrides for new elements */
      body[data-theme="midnight"] .google-btn {
        background: rgba(30, 35, 55, 0.7);
        color: #e4e7f0;
        border-color: rgba(139, 146, 176, 0.2);
      }

      body[data-theme="midnight"] .streak-badge:not(.rainbow) {
        background: rgba(30, 35, 55, 0.6);
        border-color: rgba(139, 146, 176, 0.18);
        color: #e4e7f0;
      }

      body[data-theme="midnight"] .trend-indicator {
        background: rgba(30, 35, 55, 0.6);
        border-color: rgba(139, 146, 176, 0.18);
      }

      body[data-theme="midnight"] .quick-section {
        background: linear-gradient(135deg, rgba(30, 35, 55, 0.6), rgba(30, 35, 55, 0.4));
        border-color: rgba(139, 146, 176, 0.18);
      }

      body[data-theme="midnight"] .quick-buttons button:not(.quick-save) {
        background: rgba(30, 35, 55, 0.7);
        color: #e4e7f0;
        border-color: rgba(139, 146, 176, 0.2);
      }

      @media (max-width: 980px) {
        .hero-top,
        .content-grid,
        .settings-grid,
        .input-grid,
        .hero-bottom,
        .stat-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        .app-shell {
          width: min(100% - 20px, 1180px);
          padding-top: 16px;
        }

        .hero,
        .panel {
          border-radius: 22px;
          padding: 18px;
        }

        .tab-row {
          grid-template-columns: 1fr;
        }

        .record-row,
        .row,
        .ad-slot {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body data-theme="prism">
    <div id="app"></div>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
